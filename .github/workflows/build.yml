name: CMake Build And Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  build-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      GIT_LFS_SKIP_SMUDGE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Fetch required LFS header
        run: |
          git lfs fetch --include="skewer/external/srgb_spec_data.h"
          git lfs checkout

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'skewer/CMakeLists.txt', 'skewer/tests/CMakeLists.txt', 'loom/CMakeLists.txt', 'libs/exrio/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            clang-17 \
            libopenexr-dev \
            libimath-dev \
            libpng-dev \
            zlib1g-dev \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libprotobuf-dev \
            libgrpc++-dev

      - name: Configure
        run: >
          cmake --preset ci
          -DCMAKE_C_COMPILER=clang-17
          -DCMAKE_CXX_COMPILER=clang++-17
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Reset ccache stats
        run: ccache -z

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Test
        run: ctest --preset ci --parallel -E "integration"

      - name: Fetch LFS assets for regen
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'regen-goldens')
        run: |
          git lfs fetch --include="tests/integration/fixtures/golden_images/**"
          git lfs checkout

      - name: Configure golden regeneration
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'regen-goldens')
        run: >
          cmake --preset ci
          -DCMAKE_C_COMPILER=clang-17
          -DCMAKE_CXX_COMPILER=clang++-17
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DSKEWER_GENERATE_GOLDEN=ON

      - name: Rebuild integration tests for regen
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'regen-goldens')
        run: cmake --build --preset ci --parallel --target integration_tests

      - name: Generate golden images
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'regen-goldens')
        run: ctest --preset ci -R GoldenImageTest -V

      - name: Upload golden images
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'regen-goldens')
        uses: actions/upload-artifact@v4
        with:
          name: golden-images
          if-no-files-found: error
          path: |
            tests/integration/fixtures/golden_images/*.exr
            tests/integration/fixtures/golden_images/*.png

      - name: ccache stats
        if: always()
        run: ccache -s
