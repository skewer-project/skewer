name: Static-Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'skewer/CMakeLists.txt', 'skewer/tests/CMakeLists.txt', 'loom/CMakeLists.txt', 'libs/exrio/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            clang-17 \
            libopenexr-dev \
            libimath-dev \
            libpng-dev \
            zlib1g-dev \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libprotobuf-dev \
            libgrpc++-dev \
            clang-tidy

      - name: Configure
        run: >
          cmake --preset ci
          -DCMAKE_C_COMPILER=clang-17
          -DCMAKE_CXX_COMPILER=clang++-17
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DENABLE_CLANG_TIDY=ON

      - name: Reset ccache stats
        run: ccache -z

      - name: Run Clang-Tidy
        # We use the build command because CMAKE_CXX_CLANG_TIDY
        # hooks into the actual compilation process.
        run: |
          cmake --build build --parallel $(nproc)
