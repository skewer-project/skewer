name: Scene Previewer - Biome

on:
  pull_request:
    branches: ["main"]
    paths:
      - "apps/scene-previewer/**"

jobs:
  biome:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/scene-previewer

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: apps/scene-previewer/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('apps/scene-previewer/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: CI
        run: bun run ci
