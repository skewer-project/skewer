name: Scene Previewer - build and test

on:
  pull_request:
    branches: ["main"]
    paths:
      - "apps/scene-previewer/**"
      - .github/workflows/previewer-ci.yml

jobs:
  biome:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/scene-previewer

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
          cache_dependency_path: apps/scene-previewer/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CI
        run: pnpm run ci
