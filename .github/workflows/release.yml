name: Static Release Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-static:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      GIT_LFS_SKIP_SMUDGE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Fetch required LFS header
        run: |
          git lfs fetch --include="skewer/external/srgb_spec_data.h"
          git lfs checkout

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Configure
        run: cmake --preset releasestatic

      - name: Build
        run: cmake --build --preset releasestatic --parallel

      - name: Collect binaries
        run: |
          mkdir -p release
          cp build/releasestatic/skewer/skewer-render release/
          cp build/releasestatic/skewer/skewer-worker release/
          cp build/releasestatic/loom/loom release/
          cp build/releasestatic/loom/loom-worker release/
          tar czf skewer-${{ github.ref_name }}-linux-x86_64.tar.gz -C release .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: skewer-${{ github.ref_name }}-linux-x86_64.tar.gz
