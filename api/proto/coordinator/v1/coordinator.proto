syntax = "proto3";

package api.proto.coordinator.v1;

option go_package = "github.com/skewer-project/skewer/api/proto/coordinator/v1;coordinatorv1";

// CoordinatorService is the external API for the Skewer rendering pipeline.
// Workers communicate directly with Cloud Batch/Workflows, not this service.
service CoordinatorService {
    rpc SubmitPipeline(SubmitPipelineRequest) returns (SubmitPipelineResponse);
    rpc GetPipelineStatus(GetPipelineStatusRequest) returns (GetPipelineStatusResponse);
    rpc CancelPipeline(CancelPipelineRequest) returns (CancelPipelineResponse);
}

// PipelineLayer describes a single render layer within a pipeline.
message PipelineLayer {
    string layer_id = 1;   // Unique identifier for this layer (e.g. "smoke", "character")
    string scene_uri = 2;  // GCS path to scene JSON (e.g. gs://bucket/scenes/smoke.json)
    bool enable_cache = 3; // When true, use content-hash layer caching
}

// Camera parameters shared across all layers in a pipeline.
message CameraParams {
    repeated float look_from = 1; // [x, y, z]
    repeated float look_at = 2;   // [x, y, z]
    repeated float vup = 3;       // [x, y, z] (default 0,1,0)
    float vfov = 4;               // Vertical field of view in degrees (default 90)
}

message SubmitPipelineRequest {
    string pipeline_id = 1;                 // Optional; server generates a UUID if empty
    int32 num_frames = 2;                   // Total frames to render across all layers
    repeated PipelineLayer layers = 3;
    string composite_output_uri_prefix = 4; // GCS prefix for final composited frames
    CameraParams camera = 5;               // Camera shared by all layers
    repeated string context_uris = 6;      // GCS paths to context JSON files (lighting, invisible geo)
}

message SubmitPipelineResponse {
    string pipeline_id = 1;
}

message GetPipelineStatusRequest {
    string pipeline_id = 1;
}

message GetPipelineStatusResponse {
    enum PipelineStatus {
        PIPELINE_STATUS_UNSPECIFIED = 0;
        PIPELINE_STATUS_RUNNING = 1;
        PIPELINE_STATUS_SUCCEEDED = 2;
        PIPELINE_STATUS_FAILED = 3;
        PIPELINE_STATUS_CANCELLED = 4;
    }
    PipelineStatus status = 1;
    string error_message = 2;
    map<string, string> layer_outputs = 3; // layer_id -> GCS output prefix
    string composite_output = 4;           // GCS prefix of final composited frames
}

message CancelPipelineRequest {
    string pipeline_id = 1;
}

message CancelPipelineResponse {
    bool success = 1;
}
