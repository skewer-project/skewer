site_name: Skewer & Loom
site_description: Deep rendering and compositing system
repo_url: https://github.com/skewer-project/skewer
site_url: https://skewer-project.github.io/skewer/

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.expand
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/installation.md
      - getting-started/building.md
      - getting-started/quick-start.md
  - Reference:
      - reference/cli.md
      - reference/scene-format.md
      - reference/blender-tools.md
      - reference/previewer.md
      - reference/animation.md
      - reference/compositing.md
      - reference/rendering-tips.md
  - Architecture:
      - architecture/overview.md
      - architecture/math.md
      - architecture/coordinator.md
      - architecture/skewer.md
      - architecture/loom.md
  - API:
      - Internal Networking (gRPC): api/grpc.md
      - Middleware: api/http.md
  - Deployment:
      - deployment/local.md
      - deployment/gcp.md
  - Developer Guide:
      - Overview & Onboarding: developer/index.md
      - Skewer (Renderer):
          - The Deep Image System: developer/skewer/deep_data.md
          - accelerators/: developer/skewer/accelerators.md
          - core/: developer/skewer/core.md
          - film/: developer/skewer/film.md
          - geometry/: developer/skewer/geometry.md
          - integrators/: developer/skewer/integrators.md
          - io/: developer/skewer/io.md
          - kernels/: developer/skewer/kernels.md
          - materials/: developer/skewer/materials.md
          - media/: developer/skewer/media.md
          - scene/: developer/skewer/scene.md
          - session/: developer/skewer/session.md
      - Loom (Compositor):
          - Interval Merge: developer/loom/interval_merge.md
  - Legacy: legacy/index.md

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - tables
