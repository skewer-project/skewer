site_name: Skewer & Loom
site_description: Deep rendering and compositing system
repo_url: https://github.com/skewer-project/skewer
site_url: https://skewer-project.github.io/skewer/

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tracking
    - navigation.tabs
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/installation.md
      - getting-started/building.md
      - getting-started/quick-start.md
  - Usage:
      - usage/cli.md
      - usage/scene-format.md
      - usage/blender-tools.md
      - usage/previewer.md
  - Architecture:
      - architecture/overview.md
      - architecture/math.md
      - architecture/coordinator.md
      - architecture/skewer.md
      - architecture/loom.md
  - API: api/grpc.md
  - Deployment:
      - deployment/local.md
      - deployment/gcp.md
      - deployment/gke.md
  - Legacy: legacy/index.md

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
