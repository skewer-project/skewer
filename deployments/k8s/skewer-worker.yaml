apiVersion: apps/v1
kind: Deployment
metadata:
  name: skewer-worker
  namespace: default
  labels:
    app: skewer-worker
spec:
  replicas: 0 # Scaled dynamically by the Coordinator
  selector:
    matchLabels:
      app: skewer-worker
  template:
    metadata:
      labels:
        app: skewer-worker
    spec:
      containers:
        - name: worker
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
          # NOTE: Replace this with Google Artifact Registry URI
          image: skewer-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: COORDINATOR_ADDR
              value: "skewer-coordinator.default.svc.cluster.local:50051"
            - name: RENDER_THREADS
              value: "2"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/credentials.json"
          volumeMounts:
            - name: gcp-credentials
              mountPath: "/etc/secrets"
              readOnly: true
            - name: skewer-data
              mountPath: "/data"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: gcp-credentials
          secret:
            secretName: skewer-gcp-creds
            optional: true
        - name: skewer-data
          hostPath:
            path: "{{SKEWER_DATA_PATH}}"
            type: DirectoryOrCreate
