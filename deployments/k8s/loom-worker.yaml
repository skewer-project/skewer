apiVersion: apps/v1
kind: Deployment
metadata:
  name: loom-worker
  namespace: default
  labels:
    app: loom-worker
spec:
  replicas: 0 # Scaled dynamically by the Coordinator
  selector:
    matchLabels:
      app: loom-worker
  template:
    metadata:
      labels:
        app: loom-worker
    spec:
      containers:
      - name: worker
        # NOTE: Replace this with Google Artifact Registry URI
        image: loom-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: COORDINATOR_ADDRESS
          value: "skewer-coordinator.default.svc.cluster.local:50051"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/etc/secrets/credentials.json"
        volumeMounts:
        - name: gcp-credentials
          mountPath: "/etc/secrets"
          readOnly: true
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "1000m"
            memory: "4Gi"
      volumes:
      - name: gcp-credentials
        secret:
          secretName: skewer-gcp-creds
          optional: false
