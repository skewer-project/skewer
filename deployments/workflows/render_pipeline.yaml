# Skewer Render Pipeline
#
# Orchestrates parallel layer rendering via Cloud Batch then composites all layers.
# Layers are classified as "static" (rendered once) or "animated" (rendered in
# frame chunks) by the coordinator before this workflow is invoked.
#
# Args (passed by the coordinator via CreateExecution):
#   pipeline_id             - string, unique run identifier
#   project_id              - string, GCP project
#   region                  - string, e.g. "us-west2"
#   num_frames              - int, total frames (derived from scene animation block)
#   frames_per_task         - int, animated frames rendered per Batch task (default 8)
#   layers                  - list of {layer_id, layer_uri, scene_uri, context_uris,
#                                      mode, cache_key, enable_cache}
#   data_bucket             - string, GCS bucket name for render outputs
#   cache_bucket            - string, GCS bucket name for layer cache
#   skewer_image            - string, Artifact Registry URI for skewer-worker
#   loom_image              - string, Artifact Registry URI for loom-worker
#   skewer_machine_type     - string, e.g. "n2d-highcpu-8"
#   skewer_cpu_milli        - int, vCPU request per render task in milliCPU
#   skewer_memory_mib       - int, memory request per render task in MiB
#   skewer_provisioning_model - string, "SPOT" or "STANDARD"
#   skewer_max_retry_count  - int, automatic retries for render task failures
#   loom_machine_type       - string, e.g. "e2-highmem-8"
#   loom_cpu_milli          - int, vCPU request per composite task in milliCPU
#   loom_memory_mib         - int, memory request per composite task in MiB
#   loom_provisioning_model - string, "SPOT" or "STANDARD"
#   loom_max_retry_count    - int, automatic retries for composite task failures
#   loom_parallelism        - int, max concurrent composite tasks (caps VM usage)
#   network                 - string, VPC self_link
#   subnet                  - string, subnet self_link
#   batch_sa                - string, batch worker service account email
#   composite_output_prefix - string, GCS URI prefix for final composited frames

main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${args.project_id}
          - region: ${args.region}
          - pipeline_id: ${args.pipeline_id}
          - num_frames: ${args.num_frames}
          - frames_per_task: ${args.frames_per_task}
          - data_bucket: ${args.data_bucket}
          - cache_bucket: ${args.cache_bucket}
          - skewer_image: ${args.skewer_image}
          - loom_image: ${args.loom_image}
          - skewer_machine_type: ${args.skewer_machine_type}
          - skewer_cpu_milli: ${args.skewer_cpu_milli}
          - skewer_memory_mib: ${args.skewer_memory_mib}
          - skewer_provisioning_model: ${args.skewer_provisioning_model}
          - skewer_max_retry_count: ${args.skewer_max_retry_count}
          - loom_machine_type: ${args.loom_machine_type}
          - loom_cpu_milli: ${args.loom_cpu_milli}
          - loom_memory_mib: ${args.loom_memory_mib}
          - loom_provisioning_model: ${args.loom_provisioning_model}
          - loom_max_retry_count: ${args.loom_max_retry_count}
          - loom_parallelism: ${args.loom_parallelism}
          - network: ${args.network}
          - subnet: ${args.subnet}
          - batch_sa: ${args.batch_sa}
          - composite_output_prefix: ${args.composite_output_prefix}
          - layer_output_prefixes: {}
          - layer_output_modes: {}
          - layer_output_gcs: {}

    - render_layers:
        parallel:
          shared: [layer_output_prefixes, layer_output_modes]
          for:
            value: layer
            in: ${args.layers}
            steps:
              - decide_cache:
                  switch:
                    - condition: '${layer.enable_cache AND layer.cache_key != ""}'
                      next: check_cache
                  next: do_render
              - check_cache:
                  try:
                    steps:
                      - read_manifest:
                          call: googleapis.storage.v1.objects.get
                          args:
                            bucket: ${cache_bucket}
                            object: ${layer.cache_key}
                          result: _manifest
                      - use_cache:
                          assign:
                            - layer_output_prefixes[layer.layer_id]: '${"/mnt/" + cache_bucket + "/" + layer.cache_key}'
                            - layer_output_modes[layer.layer_id]: ${layer.mode}
                  except:
                    as: _cache_miss
                    steps:
                      - cache_miss_goto:
                          next: do_render
              - skip_render:
                  next: layer_end
              - do_render:
                  switch:
                    - condition: '${layer.mode == "static"}'
                      next: render_static
                  next: render_animated
              - render_static:
                  call: submit_batch_render_static
                  args:
                    project_id: ${project_id}
                    region: ${region}
                    pipeline_id: ${pipeline_id}
                    layer: ${layer}
                    data_bucket: ${data_bucket}
                    cache_bucket: ${cache_bucket}
                    skewer_image: ${skewer_image}
                    machine_type: ${skewer_machine_type}
                    cpu_milli: ${skewer_cpu_milli}
                    memory_mib: ${skewer_memory_mib}
                    provisioning_model: ${skewer_provisioning_model}
                    max_retry_count: ${skewer_max_retry_count}
                    network: ${network}
                    subnet: ${subnet}
                    batch_sa: ${batch_sa}
                  result: static_output_prefix
              - record_static_output:
                  assign:
                    - layer_output_prefixes[layer.layer_id]: ${static_output_prefix}
                    - layer_output_modes[layer.layer_id]: "static"
                  next: write_cache_manifest
              - render_animated:
                  call: submit_batch_render_animated
                  args:
                    project_id: ${project_id}
                    region: ${region}
                    pipeline_id: ${pipeline_id}
                    layer: ${layer}
                    num_frames: ${num_frames}
                    frames_per_task: ${frames_per_task}
                    data_bucket: ${data_bucket}
                    cache_bucket: ${cache_bucket}
                    skewer_image: ${skewer_image}
                    machine_type: ${skewer_machine_type}
                    cpu_milli: ${skewer_cpu_milli}
                    memory_mib: ${skewer_memory_mib}
                    provisioning_model: ${skewer_provisioning_model}
                    max_retry_count: ${skewer_max_retry_count}
                    network: ${network}
                    subnet: ${subnet}
                    batch_sa: ${batch_sa}
                  result: animated_output_prefix
              - record_animated_output:
                  assign:
                    - layer_output_prefixes[layer.layer_id]: ${animated_output_prefix}
                    - layer_output_modes[layer.layer_id]: "animated"
                  next: write_cache_manifest
              - write_cache_manifest:
                  switch:
                    - condition: '${layer.enable_cache AND layer.cache_key != ""}'
                      next: do_write_manifest
                  next: layer_end
              - do_write_manifest:
                  try:
                    steps:
                      - build_manifest:
                          assign:
                            - _dq: '"'
                            - manifest_body: ${"{" + _dq + "ok" + _dq + ":true," + _dq + "mode" + _dq + ":" + _dq + layer.mode + _dq + "," + _dq + "num_frames" + _dq + ":" + string(num_frames) + "}"}
                      - upload_manifest:
                          call: googleapis.storage.v1.objects.insert
                          args:
                            bucket: ${cache_bucket}
                            uploadType: media
                            name: ${layer.cache_key}
                            body: ${manifest_body}
                          result: _manifest_upload
                  except:
                    as: _manifest_err
                    steps:
                      - log_manifest_err:
                          call: sys.log
                          args:
                            text: '${layer.layer_id + " cache manifest write failed: " + string(_manifest_err)}'
                            severity: WARNING
              - layer_end:
                  assign:
                    - _done: null

    - build_gcs_outputs:
        for:
          value: lid
          in: '${keys(layer_output_prefixes)}'
          steps:
            - convert_path:
                assign:
                  - layer_output_gcs[lid]: '${text.replace_all(layer_output_prefixes[lid], "/mnt/", "gs://")}'

    - composite:
        call: submit_batch_composite
        args:
          project_id: ${project_id}
          region: ${region}
          pipeline_id: ${pipeline_id}
          layer_output_prefixes: ${layer_output_prefixes}
          layer_output_modes: ${layer_output_modes}
          num_frames: ${num_frames}
          data_bucket: ${data_bucket}
          cache_bucket: ${cache_bucket}
          composite_output_prefix: ${composite_output_prefix}
          loom_image: ${loom_image}
          machine_type: ${loom_machine_type}
          cpu_milli: ${loom_cpu_milli}
          memory_mib: ${loom_memory_mib}
          provisioning_model: ${loom_provisioning_model}
          max_retry_count: ${loom_max_retry_count}
          parallelism: ${loom_parallelism}
          network: ${network}
          subnet: ${subnet}
          batch_sa: ${batch_sa}

    - return_result:
        return:
          pipeline_id: ${pipeline_id}
          status: SUCCEEDED
          output_uri: ${composite_output_prefix}
          layer_outputs: ${layer_output_gcs}

# ── Subworkflow: submit_batch_render_static ───────────────────────────────────
#
# Renders a static layer once (taskCount=1). The worker writes static.exr.
# Returns the FUSE output prefix for the layer.

submit_batch_render_static:
  params: [project_id, region, pipeline_id, layer, data_bucket, cache_bucket,
           skewer_image, machine_type, cpu_milli, memory_mib,
           provisioning_model, max_retry_count, network, subnet, batch_sa]
  steps:
    - init_static:
        assign:
          - job_id: '${pipeline_id + "-" + layer.layer_id + "-static"}'
          - fuse_data: '${"/mnt/" + data_bucket}'
          - fuse_cache: '${"/mnt/" + cache_bucket}'
          - scene_fuse: '${text.replace_all(layer.scene_uri, "gs://", "/mnt/")}'
          - output_fuse: '${fuse_data + "/renders/" + pipeline_id + "/" + layer.layer_id}'
          - cache_fuse: '${fuse_cache + "/" + layer.cache_key}'
          - context_fuse_csv: ""

    - build_context_csv_static:
        for:
          value: ctx_uri
          in: ${layer.context_uris}
          steps:
            - append_context_static:
                assign:
                  - context_fuse_csv: '${if(context_fuse_csv == "", text.replace_all(ctx_uri, "gs://", "/mnt/"), context_fuse_csv + "," + text.replace_all(ctx_uri, "gs://", "/mnt/"))}'

    - create_static_job:
        call: googleapis.batch.v1.projects.locations.jobs.create
        args:
          parent: '${"projects/" + project_id + "/locations/" + region}'
          jobId: ${job_id}
          body:
            taskGroups:
              - taskCount: 1
                taskCountPerNode: 1
                taskSpec:
                  computeResource:
                    cpuMilli: ${cpu_milli}
                    memoryMib: ${memory_mib}
                  maxRetryCount: ${max_retry_count}
                  maxRunDuration: "14400s"
                  runnables:
                    - script:
                        text: '${"mkdir -p " + fuse_data + " " + fuse_cache}'
                    - container:
                        imageUri: ${skewer_image}
                        entrypoint: /usr/local/bin/skewer-worker
                        volumes:
                          - '${fuse_data + ":" + fuse_data + ":rw"}'
                          - '${fuse_cache + ":" + fuse_cache + ":rw"}'
                  environment:
                    variables:
                      BATCH_MODE: "true"
                      SCENE_URI: ${scene_fuse}
                      LAYER_ID: ${layer.layer_id}
                      LAYER_MODE: "static"
                      FRAMES_PER_TASK: "1"
                      NUM_FRAMES: "1"
                      OUTPUT_URI_PREFIX: ${output_fuse}
                      CACHE_PREFIX: ${cache_fuse}
                      CONTEXT_URIS: ${context_fuse_csv}
                  volumes:
                    - gcs:
                        remotePath: ${data_bucket}
                      mountPath: ${fuse_data}
                    - gcs:
                        remotePath: ${cache_bucket}
                      mountPath: ${fuse_cache}
            allocationPolicy:
              tags:
                - skewer-batch-worker
              instances:
                - policy:
                    machineType: ${machine_type}
                    provisioningModel: ${provisioning_model}
              network:
                networkInterfaces:
                  - network: ${network}
                    subnetwork: ${subnet}
                    noExternalIpAddress: true
              serviceAccount:
                email: ${batch_sa}
            logsPolicy:
              destination: CLOUD_LOGGING
        result: static_job

    - poll_static:
        call: poll_batch_job
        args:
          job_name: ${static_job.name}
        result: final_static_state

    - check_static_result:
        switch:
          - condition: '${final_static_state != "SUCCEEDED"}'
            steps:
              - static_failed:
                  raise: '${layer.layer_id + " static render failed: " + final_static_state}'

    - return_static_prefix:
        return: ${output_fuse}

# ── Subworkflow: submit_batch_render_animated ─────────────────────────────────
#
# Renders an animated layer in frame chunks (taskCount = ceil(num_frames / frames_per_task)).
# Each task handles FRAMES_PER_TASK consecutive frames.
# The worker writes frame-NNNN.exr for each frame in its assigned chunk.
# Returns the FUSE output prefix for the layer.

submit_batch_render_animated:
  params: [project_id, region, pipeline_id, layer, num_frames, frames_per_task,
           data_bucket, cache_bucket, skewer_image, machine_type, cpu_milli, memory_mib,
           provisioning_model, max_retry_count, network, subnet, batch_sa]
  steps:
    - init_animated:
        assign:
          - job_id: '${pipeline_id + "-" + layer.layer_id + "-animated"}'
          - fuse_data: '${"/mnt/" + data_bucket}'
          - fuse_cache: '${"/mnt/" + cache_bucket}'
          - scene_fuse: '${text.replace_all(layer.scene_uri, "gs://", "/mnt/")}'
          - output_fuse: '${fuse_data + "/renders/" + pipeline_id + "/" + layer.layer_id}'
          - cache_fuse: '${fuse_cache + "/" + layer.cache_key}'
          - context_fuse_csv: ""
          # task_count = ceil(num_frames / frames_per_task)
          - task_count: '${int((num_frames + frames_per_task - 1) / frames_per_task)}'

    - build_context_csv_animated:
        for:
          value: ctx_uri
          in: ${layer.context_uris}
          steps:
            - append_context_animated:
                assign:
                  - context_fuse_csv: '${if(context_fuse_csv == "", text.replace_all(ctx_uri, "gs://", "/mnt/"), context_fuse_csv + "," + text.replace_all(ctx_uri, "gs://", "/mnt/"))}'

    - create_animated_job:
        call: googleapis.batch.v1.projects.locations.jobs.create
        args:
          parent: '${"projects/" + project_id + "/locations/" + region}'
          jobId: ${job_id}
          body:
            taskGroups:
              - taskCount: ${task_count}
                taskCountPerNode: 1
                taskSpec:
                  computeResource:
                    cpuMilli: ${cpu_milli}
                    memoryMib: ${memory_mib}
                  maxRetryCount: ${max_retry_count}
                  maxRunDuration: "14400s"
                  runnables:
                    - script:
                        text: '${"mkdir -p " + fuse_data + " " + fuse_cache}'
                    - container:
                        imageUri: ${skewer_image}
                        entrypoint: /usr/local/bin/skewer-worker
                        volumes:
                          - '${fuse_data + ":" + fuse_data + ":rw"}'
                          - '${fuse_cache + ":" + fuse_cache + ":rw"}'
                  environment:
                    variables:
                      BATCH_MODE: "true"
                      SCENE_URI: ${scene_fuse}
                      LAYER_ID: ${layer.layer_id}
                      LAYER_MODE: "animated"
                      FRAMES_PER_TASK: ${string(frames_per_task)}
                      NUM_FRAMES: ${string(num_frames)}
                      OUTPUT_URI_PREFIX: ${output_fuse}
                      CACHE_PREFIX: ${cache_fuse}
                      CONTEXT_URIS: ${context_fuse_csv}
                  volumes:
                    - gcs:
                        remotePath: ${data_bucket}
                      mountPath: ${fuse_data}
                    - gcs:
                        remotePath: ${cache_bucket}
                      mountPath: ${fuse_cache}
            allocationPolicy:
              tags:
                - skewer-batch-worker
              instances:
                - policy:
                    machineType: ${machine_type}
                    provisioningModel: ${provisioning_model}
              network:
                networkInterfaces:
                  - network: ${network}
                    subnetwork: ${subnet}
                    noExternalIpAddress: true
              serviceAccount:
                email: ${batch_sa}
            logsPolicy:
              destination: CLOUD_LOGGING
        result: animated_job

    - poll_animated:
        call: poll_batch_job
        args:
          job_name: ${animated_job.name}
        result: final_animated_state

    - check_animated_result:
        switch:
          - condition: '${final_animated_state != "SUCCEEDED"}'
            steps:
              - animated_failed:
                  raise: '${layer.layer_id + " animated render failed: " + final_animated_state}'

    - return_animated_prefix:
        return: ${output_fuse}

# ── Subworkflow: submit_batch_composite ───────────────────────────────────────
#
# Submits a Cloud Batch job to composite all rendered layers into final frames.
# Static layers contribute static.exr to every frame; animated layers contribute
# frame-NNNN.exr. Layer mode information is passed as parallel comma-separated lists.

submit_batch_composite:
  params: [project_id, region, pipeline_id, layer_output_prefixes, layer_output_modes,
           num_frames, data_bucket, cache_bucket, composite_output_prefix,
           loom_image, machine_type, cpu_milli, memory_mib,
           provisioning_model, max_retry_count, parallelism, network, subnet, batch_sa]
  steps:
    - init_composite:
        assign:
          - job_id: '${pipeline_id + "-composite"}'
          - fuse_data: '${"/mnt/" + data_bucket}'
          - fuse_cache: '${"/mnt/" + cache_bucket}'
          - composite_fuse: '${text.replace_all(composite_output_prefix, "gs://", "/mnt/")}'
          - layer_prefixes_csv: ""
          - layer_modes_csv: ""

    - build_layer_csvs:
        for:
          value: layer_key
          in: '${keys(layer_output_prefixes)}'
          steps:
            - append_prefix_and_mode:
                assign:
                  - layer_prefixes_csv: '${if(layer_prefixes_csv == "", layer_output_prefixes[layer_key], layer_prefixes_csv + "," + layer_output_prefixes[layer_key])}'
                  - layer_modes_csv: '${if(layer_modes_csv == "", layer_output_modes[layer_key], layer_modes_csv + "," + layer_output_modes[layer_key])}'

    - create_composite_job:
        call: googleapis.batch.v1.projects.locations.jobs.create
        args:
          parent: '${"projects/" + project_id + "/locations/" + region}'
          jobId: ${job_id}
          body:
            taskGroups:
              - taskCount: ${num_frames}
                parallelism: ${parallelism}
                taskCountPerNode: 1
                taskSpec:
                  computeResource:
                    cpuMilli: ${cpu_milli}
                    memoryMib: ${memory_mib}
                  maxRetryCount: ${max_retry_count}
                  maxRunDuration: "14400s"
                  runnables:
                    - script:
                        text: '${"mkdir -p " + fuse_data + " " + fuse_cache}'
                    - container:
                        imageUri: ${loom_image}
                        entrypoint: /usr/local/bin/loom-worker
                        volumes:
                          - '${fuse_data + ":" + fuse_data + ":rw"}'
                          - '${fuse_cache + ":" + fuse_cache + ":ro"}'
                  environment:
                    variables:
                      BATCH_MODE: "true"
                      LAYER_URI_PREFIXES: ${layer_prefixes_csv}
                      LAYER_MODES: ${layer_modes_csv}
                      OUTPUT_URI_PREFIX: ${composite_fuse}
                  volumes:
                    - gcs:
                        remotePath: ${data_bucket}
                      mountPath: ${fuse_data}
                    - gcs:
                        remotePath: ${cache_bucket}
                      mountPath: ${fuse_cache}
            allocationPolicy:
              tags:
                - skewer-batch-worker
              instances:
                - policy:
                    machineType: ${machine_type}
                    provisioningModel: ${provisioning_model}
              network:
                networkInterfaces:
                  - network: ${network}
                    subnetwork: ${subnet}
                    noExternalIpAddress: true
              serviceAccount:
                email: ${batch_sa}
            logsPolicy:
              destination: CLOUD_LOGGING
        result: composite_job

    - poll_composite:
        call: poll_batch_job
        args:
          job_name: ${composite_job.name}
        result: final_composite_state

    - check_composite_result:
        switch:
          - condition: '${final_composite_state != "SUCCEEDED"}'
            steps:
              - composite_failed:
                  raise: '${"composite failed: " + final_composite_state}'

# ── Subworkflow: poll_batch_job ────────────────────────────────────────────────
#
# Polls a Cloud Batch job until it reaches a terminal state.
# Returns the final job state string ("SUCCEEDED", "FAILED", etc.)

poll_batch_job:
  params: [job_name]
  steps:
    - poll_loop:
        steps:
          - get_job:
              call: googleapis.batch.v1.projects.locations.jobs.get
              args:
                name: ${job_name}
              result: job
          - check_state:
              switch:
                - condition: '${job.status.state == "SUCCEEDED"}'
                  return: SUCCEEDED
                - condition: '${job.status.state == "FAILED"}'
                  return: FAILED
                - condition: '${job.status.state == "DELETION_IN_PROGRESS"}'
                  return: FAILED
          - wait:
              call: sys.sleep
              args:
                seconds: 15
          - continue_polling:
              next: poll_loop
